<!-- public/index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <meta name="description" content="Portal corporativo de Construcciones Ruesma. Acceso a las aplicaciones internas según tus permisos." />
  <title>Portal · Ruesma</title>

  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Archivo:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <!-- Puerta de acceso (se muestra solo si no hay sesión: preview local sin emulador) -->
  <section id="gate" class="gate" hidden>
    <div class="gate__card">
      <img class="gate__logo" src="/assets/img/logo-ruesma.svg" alt="Construcciones Ruesma" />
      <h1 class="gate__title">Portal corporativo</h1>
      <p class="gate__text">Inicia sesión con tu cuenta de Ruesma para ver tus aplicaciones.</p>
      <button id="btn-login" class="btn btn--primary" type="button">Iniciar sesión con Microsoft</button>
    </div>
  </section>

  <!-- Aplicación -->
  <div id="app-shell" hidden>
    <header class="topbar">
      <a class="topbar__brand" href="/" aria-label="Inicio del portal">
        <img class="topbar__logo" src="/assets/img/logo-ruesma.svg" alt="Construcciones Ruesma" />
        <span class="topbar__sep" aria-hidden="true"></span>
        <span class="topbar__tag">Portal</span>
      </a>
      <div class="topbar__user" id="user-slot"></div>
    </header>

    <main class="main">
      <section class="hero">
        <p class="hero__eyebrow">Aplicaciones de la empresa</p>
        <h1 class="hero__title">Todo tu trabajo,<br /><em>en un solo sitio.</em></h1>
        <p class="hero__lead" id="summary">Cargando tus aplicaciones…</p>
      </section>

      <div id="catalog" class="catalog" aria-live="polite"></div>
    </main>

    <footer class="footer">
      <span>Construcciones Ruesma</span>
      <span class="footer__dot" aria-hidden="true">·</span>
      <span>Portal interno</span>
      <span class="footer__dot" aria-hidden="true">·</span>
      <span>Acceso según permisos de Entra ID</span>
    </footer>
  </div>

  <script src="/assets/js/catalog.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
